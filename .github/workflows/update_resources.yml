name: 自动更新 Phigros 资源

on:
  workflow_dispatch:
  schedule:
    - cron: 59 8 * * 5

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 检出公开资源仓库 (PhiResources)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          path: PhiResources

      - name: 检出私有工具仓库 (PhiAutoRenderNext)
        uses: actions/checkout@v4
        with:
          repository: Dehou23333-awa/PhiAutoRenderNext
          token: ${{ secrets.GH_TOKEN }} 
          path: tools

      - name: 安装环境与依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 libvorbis-dev jq
          cd tools
          pip install -r requirements.txt

      - name: 配置运行参数
        run: |
          cd tools
          echo '{
              "config": {
                  "SESSDATA": "",
                  "BILI_JCT": "",
                  "BUVID3": "",
                  "Aria2Port": 6800,
                  "TempPath": "./temp",
                  "RunTime": {
                      "doCleanTemp": true,
                      "doDownloadApk": true,
                      "downloadwith": "aria2",
                      "doUnpack": true,
                      "doBuildChartInfo": true,
                      "doRender": false,
                      "doUpload": false,
                      "doUpdateChartInfo": true,
                      "doConstantChange": false
                  }
              }
          }' > config.json

      - name: 执行下载与解包工作流
        run: |
          cd tools
          mkdir -p temp
          aria2c --enable-rpc --rpc-listen-all --rpc-allow-origin-all=true --rpc-listen-port=6800 -D
          python main.py

      - name: 同步资源并提交
        run: |
            ROOT_DIR=$(pwd)
            VERSION=$(jq -r '.Version' tools/Chart_info.json)
            PHIVERSION=$(jq -r '.PhiVersion' tools/Chart_info.json)
            
            mkdir -p PhiResources/chart PhiResources/ill PhiResources/music
            cp -r tools/temp/chart/* PhiResources/chart/ 2>/dev/null || true
            cp -r tools/temp/ill/* PhiResources/ill/ 2>/dev/null || true
            cp -r tools/temp/music/* PhiResources/music/ 2>/dev/null || true
            cp tools/Chart_info.json PhiResources/
            cd $ROOT_DIR/PhiResources
            
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add .
            # 检查是否有文件更改
            if [ -n "$(git status --porcelain)" ]; then
              git commit -m "自动更新资源: Phigros v$PHIVERSION (Build $VERSION)"
              git push
            else
              echo "PhiResources 无需更新"
            fi
            
            # 3. 提交 tools (PhiAutoRenderNext)
            cd $ROOT_DIR/tools
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add Chart_info.json
            # 检查 Chart_info.json 是否有更改
            if [ -n "$(git status --porcelain)" ]; then
              git commit -m "Actions: 更新谱面信息 v$PHIVERSION ($VERSION)"
              git push
            else
              echo "PhiAutoRenderNext 无需更新"
            fi
